<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Forge</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
}

header{
padding:20px;
background:#000;
border-bottom:3px solid #f7c600;
position:sticky;
top:0;
z-index:10;
}

h1{
color:#f7c600;
margin:0;
}

.search{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:#1a1a1a;
color:#fff;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:16px;
padding:20px;
}

.card{
background:#151515;
border:1px solid #2a2a2a;
border-radius:16px;
overflow:hidden;
transition:0.2s;
}

.card:hover{
transform:translateY(-3px);
border-color:#f7c600;
}

.thumb{
height:160px;
background-size:cover;
background-position:center;
background-color:#222;
}

.content{
padding:14px;
}

.title{
font-weight:800;
margin-bottom:6px;
}

.meta{
font-size:13px;
color:#bbb;
margin-bottom:4px;
}

.btn{
display:inline-block;
margin-top:10px;
padding:10px 12px;
background:#f7c600;
color:#111;
text-decoration:none;
border-radius:10px;
font-weight:800;
}

.badge{
display:inline-block;
padding:6px 10px;
background:#1c1c1c;
border:1px solid #333;
border-radius:999px;
font-size:12px;
color:#f7c600;
margin:10px 0;
}
</style>
</head>

<body>

<header>
<h1>MARKET FORGE</h1>
<input class="search" id="search" placeholder="Search mods...">
<div class="badge">Live Marketplace</div>
</header>

<div class="grid" id="grid"></div>

<script>

let mods = [];

// LIVE FETCH FROM NETLIFY FUNCTION
async function loadMods(){
try {
const res = await fetch("/.netlify/functions/mods");
mods = await res.json();
render();
} catch(e){
console.log("error loading mods", e);
}
}

function render(){

const q = document.getElementById("search").value.toLowerCase();
const grid = document.getElementById("grid");

grid.innerHTML = "";

// empty state
if(mods.length === 0){
grid.innerHTML = "<p style='padding:20px;color:#aaa'>No mods available</p>";
return;
}

mods
.filter(m => m.name.toLowerCase().includes(q))
.forEach(m => {

grid.innerHTML += `
<div class="card">
<div class="thumb" style="background-image:url('${m.image || "https://via.placeholder.com/400"}')"></div>

<div class="content">
<div class="title">${m.name}</div>
<div class="meta">Type: ${m.type}</div>
<div class="meta">By: ${m.by}</div>

<a class="btn" href="${m.download}" target="_blank">Download</a>
</div>
</div>
`;

});

}

document.getElementById("search").addEventListener("input", render);

loadMods();

// auto refresh (sync)
setInterval(loadMods, 15000);

</script>

</body>
</html>
