<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Mods</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #0d1117;
        color: white;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        color: #58a6ff;
    }

    .search-box {
        text-align: center;
        margin-bottom: 20px;
    }

    input {
        width: 80%;
        max-width: 500px;
        padding: 12px;
        border: none;
        border-radius: 8px;
        outline: none;
        font-size: 16px;
    }

    .filters {
        text-align: center;
        margin-bottom: 25px;
    }

    .filters button {
        background: #21262d;
        color: white;
        border: none;
        padding: 10px 16px;
        margin: 5px;
        border-radius: 8px;
        cursor: pointer;
    }

    .filters button:hover {
        background: #58a6ff;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #161b22;
        border-radius: 10px;
        overflow: hidden;
    }

    th, td {
        padding: 14px;
        text-align: center;
        border-bottom: 1px solid #30363d;
    }

    th {
        background: #21262d;
    }

    a {
        color: #58a6ff;
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }

    @media(max-width:768px){
        table {
            font-size: 12px;
        }
    }
</style>
</head>
<body>

<h1>Marketplace Mods</h1>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search mods...">
</div>

<div class="filters">
    <button onclick="filterMods('ALL')">ALL</button>
    <button onclick="filterMods('ADD-ONS')">ADD-ONS</button>
    <button onclick="filterMods('TEXTURES')">TEXTURES</button>
    <button onclick="filterMods('WORLDS')">WORLDS</button>
    <button onclick="filterMods('SKINS')">SKINS</button>
</div>

<table id="modsTable">
    <thead>
        <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Size</th>
            <th>Download</th>
            <th>Marketplace</th>
        </tr>
    </thead>
    <tbody id="modsBody">
        <tr data-type="ADD-ONS">
            <td>Dragon Expansion</td>
            <td>ADD-ONS</td>
            <td>25MB</td>
            <td><a href="#">Download</a></td>
            <td><a href="#">Marketplace</a></td>
        </tr>

        <tr data-type="TEXTURES">
            <td>Ultra HD Texture Pack</td>
            <td>TEXTURES</td>
            <td>45MB</td>
            <td><a href="#">Download</a></td>
            <td><a href="#">Marketplace</a></td>
        </tr>

        <tr data-type="WORLDS">
            <td>Survival Kingdom</td>
            <td>WORLDS</td>
            <td>80MB</td>
            <td><a href="#">Download</a></td>
            <td><a href="#">Marketplace</a></td>
        </tr>

        <tr data-type="SKINS">
            <td>Anime Skin Pack</td>
            <td>SKINS</td>
            <td>12MB</td>
            <td><a href="#">Download</a></td>
            <td><a href="#">Marketplace</a></td>
        </tr>
    </tbody>
</table>

<script>
const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("keyup", function () {
    const filter = searchInput.value.toLowerCase();
    const rows = document.querySelectorAll("#modsBody tr");

    rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(filter) ? "" : "none";
    });
});

function filterMods(type) {
    const rows = document.querySelectorAll("#modsBody tr");

    rows.forEach(row => {
        if (type === "ALL") {
            row.style.display = "";
        } else {
            row.style.display = row.dataset.type === type ? "" : "none";
        }
    });
}
</script>

</body>
</html>
